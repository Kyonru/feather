name: Lua E2E

on:
  pull_request:
    paths:
      - "src-lua/**"
      - "scripts/lua-e2e.mjs"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/lua-e2e.yml"
  push:
    branches: [main, dev]
    paths:
      - "src-lua/**"
      - "scripts/lua-e2e.mjs"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/lua-e2e.yml"
  workflow_dispatch:

jobs:
  lua-e2e:
    name: Lua runtime end-to-end
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install LÖVE
        run: |
          sudo apt-get update
          sudo apt-get install -y love xvfb

      - name: Install dependencies
        run: npm ci

      - name: Run Lua E2E
        run: npm run test:lua:e2e
