name: Tauri E2E

on:
  pull_request:
    paths:
      - "src-tauri/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/tauri-e2e.yml"
  push:
    branches: [ main, next ]
    paths:
      - "src-tauri/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/tauri-e2e.yml"
  workflow_dispatch:

jobs:
  tauri-e2e:
    name: Tauri WebSocket server
    runs-on: ubuntu-22.04
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Run Tauri E2E
        run: npm run test:tauri:e2e
