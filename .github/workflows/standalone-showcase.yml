name: Standalone showcase

on:
  push:
    branches: [ main ]
    paths:
      - package.json
      - package-lock.json
      - showcase.html
      - vite.showcase.config.ts
      - public/showcase-lovejs/**
      - scripts/build-showcase-love.mjs
      - src/components/**
      - src/hooks/**
      - src/pages/particle-system-playground/**
      - src/pages/shader-graph/**
      - src/showcase/**
      - src/store/**
      - src/types/**
      - src-lua/example/showcase_preview/**
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build showcase
        run: npm run showcase:build

      - name: Showcase smoke test
        run: npm run test:showcase:e2e

      - name: Write branch landing note
        run: |
          cat > dist-showcase/README.md <<'EOF'
          # Feather Standalone Showcase

          Generated static build for Feather's standalone Shader Graph and Particle System Playground showcase.

          The `/showcase-lovejs/` path is the isolated LÖVE preview boundary. If you replace the included bridge with the full 2dengine love.js player, configure:

          - `Cross-Origin-Opener-Policy: same-origin`
          - `Cross-Origin-Embedder-Policy: require-corp`
          - `Content-Security-Policy: script-src 'self' 'unsafe-eval'`

          Sources: https://github.com/2dengine/love.js/ and https://2dengine.com/doc/lovejs.html
          EOF

      - name: Publish static branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: standalone-showcase
          publish_dir: dist-showcase
          force_orphan: true
