name: CLI E2E

on:
  pull_request:
    paths:
      - "cli/**"
      - "src-lua/**"
      - "scripts/bundle-lua.sh"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/cli-e2e.yml"
  push:
    branches: [main]
    paths:
      - "cli/**"
      - "src-lua/**"
      - "scripts/bundle-lua.sh"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/cli-e2e.yml"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  cli-e2e:
    name: CLI end-to-end (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.21.1
          cache: "npm"

      - name: Install LÖVE (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y love squashfs-tools

      - name: Install LÖVE and squashfs-tools (macOS)
        if: runner.os == 'macOS'
        run: |
          curl -L https://github.com/love2d/love/releases/download/11.5/love-11.5-macos.zip -o love-macos.zip
          ditto -x -k love-macos.zip love-macos
          sudo cp -R love-macos/love.app /Applications/love.app
          sudo ln -sf /Applications/love.app/Contents/MacOS/love /usr/local/bin/love
          love --version
          brew install squashfs

      - name: Install dependencies
        run: npm ci

      - name: Run CLI E2E
        run: npm run test:cli:e2e
