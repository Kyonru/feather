name: App E2E

on:
  pull_request:
    paths:
      - "src/**"
      - "e2e/**"
      - "playwright.config.ts"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/app-e2e.yml"
  push:
    branches: [main, dev]
    paths:
      - "src/**"
      - "e2e/**"
      - "playwright.config.ts"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/app-e2e.yml"
  workflow_dispatch:

jobs:
  app-e2e:
    name: React app end-to-end
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run app E2E
        run: npm run test:app:e2e
