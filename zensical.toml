[project]
repo_url = "https://github.com/Kyonru/feather"
repo_name = "Kyonru/feather"
site_name = "Feather"
site_description = "Real-time debug & inspect tool for LÖVE (love2d) games."
site_author = "Kyonru"
site_url = "https://kyonru.github.io/feather"

copyright = """
Copyright &copy; 2026 Kyonru
"""

nav = [
  { "Home" = "index.md" },
  { "Getting Started" = [
    { "Installation" = "installation.md" },
    { "Usage" = "usage.md" },
    { "Session" = "session.md" },
    { "Configuration" = "configuration.md" },
    { "Recommendations" = "recommendations.md" },
    { "CLI" = [
      { "Overview" = "cli.md" },
      { "Package Management" = "packages.md" },
    ] },
    { "VS Code Extension" = "vscode-extension.md" },
    { "MCP" = "mcp.md" },
    { "Agent Skills" = "skills.md" },
  ] },
  { "Core Debugging" = [
    { "Console" = "console.md" },
    { "Debugger" = "debugger.md" },
    { "Hot Reload" = "hot-reload.md" },
    { "Logs" = "logs.md" },
  ] },
  { "Performance & Observability" = [
    { "Observability" = "observability.md" },
    { "Performance" = "performance.md" },
    { "Profiler" = "profiler.md" },
  ] },
  { "Session Tools" = [
    { "Session Replay" = "session-replay.md" },
    { "Time Travel" = "time-travel.md" },
    { "Assets" = "assets.md" },
    { "Standalone Showcase" = "standalone-showcase.md" },
  ] },
  { "Creative Tools" = [
    { "Particle System Playground" = "particle-system-playground.md" },
    { "Shader Graph" = "shader-graph.md" },
    { "Texture Lab" = "texture-lab.md" },
  ] },
  { "Plugins" = [
    { "Overview" = "plugins.md" },
    { "Plugin UI" = "plugins-ui.md" },
    { "Animation Inspector" = "plugins/animation-inspector.md" },
    { "Audio Debug" = "plugins/audio-debug.md" },
    { "Bookmark" = "plugins/bookmark.md" },
    { "Collision Debug" = "plugins/collision-debug.md" },
    { "Config Tweaker" = "plugins/config-tweaker.md" },
    { "Coroutine Monitor" = "plugins/coroutine-monitor.md" },
    { "Entity Inspector" = "plugins/entity-inspector.md" },
    { "Feel Inspector" = "plugins/feel-inspector.md" },
    { "Filesystem" = "plugins/filesystem.md" },
    { "HUMP Signal" = "plugins/hump-signal.md" },
    { "In-game Overlay" = "plugins/ingame-overlay.md" },
    { "Input Replay" = "plugins/input-replay.md" },
    { "Lua State Machine" = "plugins/lua-state-machine.md" },
    { "Memory Snapshot" = "plugins/memory-snapshot.md" },
    { "Network Inspector" = "plugins/network-inspector.md" },
    { "Particle Editor" = "plugins/particle-editor.md" },
    { "Physics Debug" = "plugins/physics-debug.md" },
    { "Runtime Snapshot" = "plugins/runtime-snapshot.md" },
    { "Screenshots" = "plugins/screenshots.md" },
    { "Timer Inspector" = "plugins/timer-inspector.md" },
  ] },
]

[project.theme]
language = "en"

features = [
  "content.code.annotate",
  "content.code.copy",
  "content.code.select",
  "content.footnote.tooltips",
  "content.tabs.link",
  "content.tooltips",
  "navigation.footer",
  "navigation.indexes",
  "navigation.instant",
  "navigation.instant.prefetch",
  "navigation.path",
  "navigation.sections",
  "navigation.top",
  "navigation.tracking",
  "search.highlight",
]

[[project.theme.palette]]
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/Kyonru/feather"

[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.def_list]
[project.markdown_extensions.footnotes]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.toc]
permalink = true
[project.markdown_extensions.pymdownx.arithmatex]
generic = true
[project.markdown_extensions.pymdownx.betterem]
[project.markdown_extensions.pymdownx.caret]
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.emoji]
emoji_generator = "zensical.extensions.emoji.to_svg"
emoji_index = "zensical.extensions.emoji.twemoji"
[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.keys]
[project.markdown_extensions.pymdownx.magiclink]
[project.markdown_extensions.pymdownx.mark]
[project.markdown_extensions.pymdownx.smartsymbols]
[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" }
]
[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
combine_header_slug = true
[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true
[project.markdown_extensions.pymdownx.tilde]
