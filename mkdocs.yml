site_name: Feather
site_description: Real-time debug & inspect tool for LÖVE (love2d) games.
site_url: https://kyonru.github.io/feather
repo_url: https://github.com/Kyonru/feather
repo_name: Kyonru/feather

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.top
    - content.code.copy
    - search.suggest
    - search.highlight

nav:
  - Home: index.md
  - Installation: installation.md
  - Configuration: configuration.md
  - Usage: usage.md
  - Debugger: debugger.md
  - Assets: assets.md
  - CLI: cli.md
  - Time Travel: time-travel.md
  - Console: console.md
  - Recommendations: recommendations.md
  - Plugins:
      - Overview: plugins.md
      - Animation Inspector: plugins/animation-inspector.md
      - Audio Debug: plugins/audio-debug.md
      - Bookmark: plugins/bookmark.md
      - Collision Debug: plugins/collision-debug.md
      - Config Tweaker: plugins/config-tweaker.md
      - Coroutine Monitor: plugins/coroutine-monitor.md
      - Entity Inspector: plugins/entity-inspector.md
      - Filesystem: plugins/filesystem.md
      - HUMP Signal: plugins/hump-signal.md
      - Input Replay: plugins/input-replay.md
      - Lua State Machine: plugins/lua-state-machine.md
      - Memory Snapshot: plugins/memory-snapshot.md
      - Network Inspector: plugins/network-inspector.md
      - Particle Editor: plugins/particle-editor.md
      - Physics Debug: plugins/physics-debug.md
      - Profiler: plugins/profiler.md
      - Screenshots: plugins/screenshots.md
      - Timer Inspector: plugins/timer-inspector.md

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true
